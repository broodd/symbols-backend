  mongodb:
    image: mongo:7
    container_name: symbols-mongodb
    ports:
      - '27017:27017'
    networks:
      - network
    volumes:
      - mongodb_data:/data/db

networks:
  network:
    driver: bridge

volumes:
  mongodb_data:

secrets:
  mongodb-uri:
    file: ./.secrets/mongodb-uri

  jwt-secret-access-token:
    file: ./.secrets/jwt-secret-access-token
  jwt-secret-refresh-token:
    file: ./.secrets/jwt-secret-refresh-token

  swagger-username:
    file: ./.secrets/swagger-username
  swagger-password:
    file: ./.secrets/swagger-password
